<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 350px;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f7f9fc;
        color: #1f2937;
      }
      #root {
        padding: 16px;
      }
      h3 {
        margin: 0 0 14px;
        font-size: 16px;
        font-weight: 600;
      }
      .form-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      label {
        font-size: 12px;
        font-weight: 600;
        color: #374151;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 5px;
        font-size: 13px;
      }
      input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }
      button {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: none;
        border-radius: 5px;
        background: #2563eb;
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #1d4ed8;
      }
      button:active {
        background: #1e40af;
      }
      .status {
        min-height: 18px;
        font-size: 12px;
        margin-top: 8px;
        padding: 6px 8px;
        border-radius: 4px;
        text-align: center;
      }
      .status.success {
        color: #065f46;
        background: #ecfdf5;
      }
      .status.error {
        color: #991b1b;
        background: #fef2f2;
      }
      .status.info {
        color: #1e40af;
        background: #eff6ff;
      }
      button.secondary {
        margin-top: 0;
        background: #e5e7eb;
        color: #111827;
      }
      button.secondary:hover {
        background: #d1d5db;
      }
      .hint {
        font-size: 11px;
        color: #6b7280;
        margin-top: 8px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="popup.js"></script>
  </body>
</html>
